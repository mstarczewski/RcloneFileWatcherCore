name: Build & Release

on:
  push:
    branches:
      - master      # release only when the commit message contains "[release]" (gated below)
    tags:
      - 'v*.*'      # an explicit version tag always releases
  workflow_dispatch:
    inputs:
      tag:
        description: 'Optional tag name'
        required: false
        default: ''

# The release step creates the tag, so the token needs write access to repo contents.
permissions:
  contents: write

jobs:
  # Decide ONE version for the whole run so the Windows and Linux artifacts always carry the same
  # number. From a tag push / dispatch tag it's the tag (without the leading "v"); otherwise it's a
  # CalVer stamp computed once here: yyyy.MM.dd.HHmms (UTC), matching Directory.Build.props.
  #
  # This job also gates the whole workflow: it runs (and so do the jobs that need it) only for a
  # version tag, a manual dispatch, or a push to master whose head commit contains "[release]".
  # A plain master push without that marker skips everything — no accidental releases.
  version:
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'push' && contains(github.event.head_commit.message, '[release]'))
    outputs:
      version: ${{ steps.v.outputs.version }}
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - name: Determine version
        id: v
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            tag="${{ github.ref_name }}"          # tag push: use the tag verbatim
            ver="${tag#v}"
          elif [ -n "${{ github.event.inputs.tag }}" ]; then
            tag="${{ github.event.inputs.tag }}"  # manual dispatch with an explicit tag
            ver="${tag#v}"
          else
            t="$(date -u +'%H%M%S')"              # master push / dispatch: CalVer stamp
            ver="$(date -u +'%Y.%m.%d').${t:0:5}"
            tag="v$ver"
          fi
          echo "Resolved version=$ver tag=$tag"
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

  build-windows:
    needs: version
    runs-on: windows-latest
    env:
      Configuration: Release
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout repo with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore -c ${{ env.Configuration }} -p:Version=${{ env.VERSION }}

      - name: Run tests
        run: dotnet test RcloneFileWatcherCore.Tests/RcloneFileWatcherCore.Tests.csproj --no-build -c ${{ env.Configuration }}

      - name: Publish Windows console app
        run: dotnet publish RcloneFileWatcherCore/RcloneFileWatcherCore.csproj -c Release -r win-x64 --self-contained false -p:PublishSingleFile=true -p:Version=${{ env.VERSION }}

      - name: Publish Windows web GUI (folder)
        run: dotnet publish RcloneFileWatcherCore.Web/RcloneFileWatcherCore.Web.csproj -c Release -r win-x64 --self-contained false -p:Version=${{ env.VERSION }}

      - name: Prepare Windows artifacts
        shell: pwsh
        run: |
          $ws = "${{ github.workspace }}"
          New-Item -ItemType Directory -Path "$ws\artifacts" -Force | Out-Null

          # Console: single-file exe (+ version.json if present)
          $consolePub = "$ws\RcloneFileWatcherCore\bin\Release\net8.0\win-x64\publish"
          $items = @(Get-ChildItem "$consolePub\*.exe")
          if (Test-Path "$consolePub\version.json") { $items += Get-Item "$consolePub\version.json" }
          Compress-Archive -Path $items -DestinationPath "$ws\artifacts\app-win-x64.zip" -Force

          # Web GUI: whole publish folder (dll + wwwroot + locales)
          $webPub = "$ws\RcloneFileWatcherCore.Web\bin\Release\net8.0\win-x64\publish"
          Compress-Archive -Path "$webPub\*" -DestinationPath "$ws\artifacts\app-web-win-x64.zip" -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-x64
          path: ${{ github.workspace }}/artifacts/*.zip

  build-linux:
    needs: version
    runs-on: ubuntu-latest
    env:
      Configuration: Release
      VERSION: ${{ needs.version.outputs.version }}

    steps:
      - name: Checkout repo with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build solution
        run: dotnet build --no-restore -c ${{ env.Configuration }} -p:Version=${{ env.VERSION }}

      - name: Run tests
        run: dotnet test RcloneFileWatcherCore.Tests/RcloneFileWatcherCore.Tests.csproj --no-build -c ${{ env.Configuration }}

      - name: Publish Linux console app
        run: dotnet publish RcloneFileWatcherCore/RcloneFileWatcherCore.csproj -c Release -r linux-x64 --self-contained false -p:Version=${{ env.VERSION }}

      - name: Publish Linux web GUI (folder)
        run: dotnet publish RcloneFileWatcherCore.Web/RcloneFileWatcherCore.Web.csproj -c Release -r linux-x64 --self-contained false -p:Version=${{ env.VERSION }}

      - name: Prepare Linux artifacts
        run: |
          set -e
          ws="${{ github.workspace }}"
          mkdir -p "$ws/artifacts"

          # Console
          consolePub="$ws/RcloneFileWatcherCore/bin/Release/net8.0/linux-x64/publish"
          chmod +x "$consolePub/RcloneFileWatcherCore" || true
          ( cd "$consolePub"
            files="RcloneFileWatcherCore"
            [ -f version.json ] && files="$files version.json"
            zip -r "$ws/artifacts/app-linux-x64.zip" $files )

          # Web GUI: whole publish folder
          webPub="$ws/RcloneFileWatcherCore.Web/bin/Release/net8.0/linux-x64/publish"
          chmod +x "$webPub/RcloneFileWatcherCore.Web" || true
          (cd "$webPub" && zip -r "$ws/artifacts/app-web-linux-x64.zip" .)

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: ${{ github.workspace }}/artifacts/*.zip

  create_release:
    needs: [version, build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo with full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: ${{ github.workspace }}/artifacts

      - name: Flatten artifact files into artifacts/ root
        run: |
          set -e
          ART_DIR="${{ github.workspace }}/artifacts"
          find "$ART_DIR" -mindepth 2 -name '*.zip' -exec mv -t "$ART_DIR" {} +
          echo "Artifacts to upload:"
          ls -la "$ART_DIR"

      - name: Generate changelog
        id: changelog
        run: |
          git fetch --tags
          latest_tag=$(git describe --tags --abbrev=0 "HEAD^" 2>/dev/null || git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$latest_tag" ]; then
            range=""
          else
            range="$latest_tag..HEAD"
          fi
          # Prefer conventional-commit lines; fall back to all subjects so the notes aren't empty.
          log=$(git log $range --pretty=format:"- %s [%h]" | grep -E '^- (feat|fix|BREAKING CHANGE)' || true)
          if [ -z "$log" ]; then
            log=$(git log $range --pretty=format:"- %s [%h]" || true)
          fi
          if [ -z "$log" ]; then
            log="(no changelog entries found)"
          fi
          {
            echo "changelog<<EOF"
            echo "$log"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Release ${{ needs.version.outputs.version }}
          body: |
            ### Changes since last release
            ${{ steps.changelog.outputs.changelog }}

            ### Version
            `${{ needs.version.outputs.version }}`

            ### Artifacts
            - `app-win-x64.zip` / `app-linux-x64.zip` — headless console app (single file on Windows)
            - `app-web-win-x64.zip` / `app-web-linux-x64.zip` — web GUI (run as a folder: `dotnet RcloneFileWatcherCore.Web.dll`)
          files: |
            artifacts/app-win-x64.zip
            artifacts/app-linux-x64.zip
            artifacts/app-web-win-x64.zip
            artifacts/app-web-linux-x64.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
